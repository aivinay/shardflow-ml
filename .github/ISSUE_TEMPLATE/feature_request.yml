name: Feature request
description: Suggest a manifest, planner, checkpoint, or storage improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the command, API, or behavior you want.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Include public, scrubbed examples if helpful.
