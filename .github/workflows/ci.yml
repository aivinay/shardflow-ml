name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: python -m unittest discover -s tests
      - name: Lint
        run: ruff check .
      - name: Build
        run: python -m build
      - name: Smoke
        run: |
          shardflow --version
          shardflow doctor --data-dir examples/data --format json
          shardflow schema --format json
          shardflow index examples/data --output /tmp/shardflow-manifest.json
          shardflow inspect --manifest /tmp/shardflow-manifest.json --format json
          shardflow verify --manifest /tmp/shardflow-manifest.json
